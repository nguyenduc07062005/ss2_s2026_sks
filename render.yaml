services:
  - type: web
    name: sks-s2026-backend
    runtime: node
    plan: free
    rootDir: sks-backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migration:run && npm run start:prod
    healthCheckPath: /api
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.22.0"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SYNC
        value: "false"
      - key: DATABASE_LOGGING
        value: "false"
      - key: CORS_ORIGIN
        value: https://smartknowledge.onrender.com
      - key: FRONTEND_URL
        value: https://smartknowledge.onrender.com
      - key: DOCUMENT_STORAGE_DRIVER
        value: r2
      - key: CLOUDFLARE_R2_ACCOUNT_ID
        value: 9a8821caccfda3d63668f9dc96cbec56
      - key: CLOUDFLARE_R2_BUCKET
        value: smartknowledge-documents
      - key: CLOUDFLARE_R2_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_R2_SECRET_ACCESS_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "1d"
      - key: MAIL_PROVIDER
        value: brevo
      - key: BREVO_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: MIMO_API_KEY
        sync: false
      - key: MIMO_BASE_URL
        value: https://token-plan-sgp.xiaomimimo.com/v1
      - key: MIMO_MODEL
        value: mimo-v2.5-pro

  - type: web
    name: smartknowledge
    runtime: static
    rootDir: sks-frontend
    buildCommand: npm ci --include=dev && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: VITE_API_BASE_URL
        value: https://sks-s2026-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
